services:
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: ["redis-server" , "--appendonly" , "yes"]
    volumes:
      - redis-data:/data
  
  mongo:
    image: mongo:7
    container_name: mongo
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=redis-course
    volumes:
      - mongo-data:/data/db

volumes:
  redis-data:
  mongo-data: